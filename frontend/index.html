<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>WSL Path Manager</title>
    <link rel="stylesheet" href="./style.css"/>
</head>
<body class="dark">
    <div id="app">
        <!-- Controls -->
        <div class="controls-container">
            <div class="distro-selector">
                <select id="distroSelect">
                    <option value="" disabled selected>Select a Distro</option>
                </select>
            </div>
            <div class="spacer"></div>
            <button id="scanBtn" class="primary-btn">
                <span class="icon">&#xE721;</span>
                Scan Paths
            </button>
        </div>

        <!-- Loading & Results -->
        <div class="results-container">
            <div id="loading" class="loading-ring" style="display: none;"></div>
            
            <div id="results" class="results-layout" style="display: none;">
                <div class="results-header">
                    <button id="selectAllBtn" class="link-btn">Select All</button>
                    <button id="unselectAllBtn" class="link-btn">Unselect All</button>
                </div>
                <div class="results-card">
                    <div id="toolsList" class="tools-list">
                        <!-- Tool items will go here -->
                    </div>
                </div>
            </div>

            <div id="emptyState" class="empty-state">
                Select a Distro to Scan
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="actions-container">
            <button id="settingsBtn" class="icon-btn" title="Settings">
                <span class="icon">&#xE713;</span>
            </button>
            <div class="spacer"></div>
            <button id="saveBtn" class="primary-btn" style="display: none;">Save &amp; Apply Settings</button>
        </div>
        <!-- Settings Modal -->
        <div id="settingsModal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Settings</h2>
                    <button id="closeSettingsBtn" class="icon-btn">
                        <span class="icon">&#xE711;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="setting-row">
                        <span>Theme</span>
                        <select id="themeSelect">
                            <option value="dark">Dark Mode</option>
                            <option value="light">Light Mode</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>

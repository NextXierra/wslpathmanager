name: Build Windows Installer

on:
  push:
    branches: [main, feature/windows-installer]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Add Go/bin to PATH
        run: echo "$env:USERPROFILE/go/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build NSIS Installer
        run: wails build --nsis

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wslpathmanager-amd64-installer
          path: bin/*-setup.exe
          retention-days: 14

      - name: Build standalone exe
        run: wails build

      - name: Upload standalone exe
        uses: actions/upload-artifact@v4
        with:
          name: wslpathmanager-standalone
          path: bin/wslpathmanager.exe
          retention-days: 14
